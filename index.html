<!DOCTYPE html>
<html>
<head>
<title>FIXED GTA</title>
</head>

<body style="margin:0;background:black;color:white;">

<div id="loader" style="position:fixed;inset:0;display:flex;justify-content:center;align-items:center;flex-direction:column;">
<h1>LOADING...</h1>
<button id="play">PLAY</button>
</div>

<script>
const play = document.getElementById("play");

play.onclick = () => {
document.getElementById("loader").style.display = "none";

/* LOAD THREE.JS FIRST */
const script = document.createElement("script");
script.src = "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js";

script.onload = startGame;

script.onerror = () => {
document.body.innerHTML = "❌ THREE.JS FAILED TO LOAD (CDN BLOCKED)";
};

document.body.appendChild(script);
};

function startGame(){

if(typeof THREE === "undefined"){
document.body.innerHTML = "❌ THREE STILL NOT LOADED";
return;
}

/* BASIC TEST SCENE */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* CAR */
const car = new THREE.Mesh(
new THREE.BoxGeometry(1,1,2),
new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(car);

/* LIGHT */
const light = new THREE.AmbientLight(0xffffff);
scene.add(light);

/* LOOP */
function animate(){
requestAnimationFrame(animate);
car.position.x += 0.01;
renderer.render(scene,camera);
}
animate();

}

</script>

</body>
</html>
