<!DOCTYPE html>
<html>
<head>
<title>NEON GTA UPGRADED</title>
</head>

<body style="margin:0;background:black;color:white;overflow:hidden;">

<div id="loader" style="position:fixed;inset:0;display:flex;justify-content:center;align-items:center;flex-direction:column;background:black;z-index:10;">
<h1>LOADING NEON GTA...</h1>
<button id="play">PLAY</button>
</div>

<script>

const play = document.getElementById("play");

play.onclick = () => {
document.getElementById("loader").style.display = "none";

/* LOAD THREE */
const script = document.createElement("script");
script.src = "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js";
script.onload = startGame;
document.body.appendChild(script);
};

function startGame(){

/* SCENE */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,1));

/* PLAYER */
const car = new THREE.Mesh(
new THREE.BoxGeometry(1,1,2),
new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(car);

/* GROUND */
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x222222})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* SYSTEMS */
let keys = {};
let speed = 0;
let score = 0;
let health = 100;
let wanted = 0;
let cooldown = 0;
let time = 0;

/* BULLETS */
let bullets = [];
let police = [];
let traffic = [];
let explosions = [];

/* MISSION */
let mission = {x:0,z:-100,done:false};

/* INPUT */
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* SHOOT */
function beep(f){
const a = new (window.AudioContext||window.webkitAudioContext)();
const o=a.createOscillator();
o.frequency.value=f;
o.connect(a.destination);
o.start();
o.stop(a.currentTime+0.05);
}

function shoot(){
if(cooldown>0) return;

beep(600);

let b = new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xffff00})
);
b.position.copy(car.position);
scene.add(b);
bullets.push(b);

cooldown = 15;
}

/* POLICE */
for(let i=0;i<8;i++){
let p = new THREE.Mesh(
new THREE.BoxGeometry(1,1,2),
new THREE.MeshBasicMaterial({color:0x0000ff})
);
p.position.set(Math.random()*20-10,0,car.position.z-50);
scene.add(p);
police.push(p);
}

/* TRAFFIC */
for(let i=0;i<10;i++){
let t = new THREE.Mesh(
new THREE.BoxGeometry(1,1,2),
new THREE.MeshBasicMaterial({color:0x00ff00})
);
t.position.set(Math.random()*20-10,0,car.position.z-Math.random()*100);
scene.add(t);
traffic.push(t);
}

/* EXPLOSION */
function explode(x,y,z){
for(let i=0;i<10;i++){
let e = new THREE.Mesh(
new THREE.SphereGeometry(0.1),
new THREE.MeshBasicMaterial({color:0xff6600})
);
e.position.set(x,y,z);
e.velocity = new THREE.Vector3(
(Math.random()-0.5)*0.3,
Math.random()*0.3,
(Math.random()-0.5)*0.3
);
scene.add(e);
explosions.push(e);
}
}

/* SHOOT KEY */
document.addEventListener("keydown",e=>{
if(e.key===" ") shoot();
});

/* HUD */
let hud = document.createElement("div");
hud.style.position="fixed";
hud.style.top="10px";
hud.style.left="10px";
hud.style.color="white";
document.body.appendChild(hud);

/* MINIMAP */
let mini = document.createElement("canvas");
mini.width=150;mini.height=150;
mini.style.position="fixed";
mini.style.right="10px";
mini.style.bottom="10px";
mini.style.border="2px solid white";
document.body.appendChild(mini);
let mctx = mini.getContext("2d");

/* LOOP */
function animate(){
requestAnimationFrame(animate);

time += 0.01;

/* DAY/NIGHT */
scene.background = new THREE.Color(0.2+Math.sin(time)*0.2,0.3,0.6);

/* COOLDOWN */
if(cooldown>0) cooldown--;

/* DRIVE */
speed *= 0.95;
if(keys["w"]) speed += 0.01;
if(keys["s"]) speed -= 0.01;
if(keys["a"]) car.position.x -= 0.1;
if(keys["d"]) car.position.x += 0.1;

car.position.z -= speed;

/* CAMERA */
camera.position.lerp(car.position.clone().add(new THREE.Vector3(0,5,10)),0.1);
camera.lookAt(car.position);

/* MISSION */
if(!mission.done && car.position.distanceTo(new THREE.Vector3(mission.x,0,mission.z))<2){
score += 100;
wanted++;
mission.done = true;
}

/* BULLETS */
bullets.forEach((b,i)=>{
b.position.z -= 0.5;

police.forEach(p=>{
if(b.position.distanceTo(p.position)<1){
explode(p.position.x,p.position.y,p.position.z);
p.position.set(Math.random()*20-10,0,car.position.z-50);
score += 10;
wanted++;
scene.remove(b);
bullets.splice(i,1);
}
});
});

/* POLICE AI */
police.forEach(p=>{
p.position.z += 0.03 + wanted*0.01;
p.position.x += (car.position.x - p.position.x)*0.02;

if(p.position.distanceTo(car.position)<1.5){
health -= 1;
}
});

/* TRAFFIC */
traffic.forEach(t=>{
t.position.z += 0.05;
if(t.position.z>car.position.z+20){
t.position.z = car.position.z-100;
t.position.x = Math.random()*20-10;
}
});

/* EXPLOSIONS */
explosions.forEach((e,i)=>{
e.position.add(e.velocity);
e.scale.multiplyScalar(0.96);
if(e.scale.x<0.05){
scene.remove(e);
explosions.splice(i,1);
}
});

/* WANTED */
wanted = Math.max(0,Math.min(5,wanted));

/* HUD */
hud.innerHTML =
`🚗 SPEED: ${speed.toFixed(2)}<br>
❤️ HEALTH: ${health}<br>
💰 SCORE: ${score}<br>
🚨 WANTED: ${"⭐".repeat(wanted)}<br>
🎯 MISSION: ${mission.done?"DONE":"ACTIVE"}`;

/* MINIMAP */
mctx.fillStyle="black";
mctx.fillRect(0,0,150,150);

mctx.fillStyle="red";
mctx.fillRect(75,75,5,5);

mctx.fillStyle="blue";
police.forEach(p=>{
mctx.fillRect(75+(p.position.x-car.position.x)*2,75+(p.position.z-car.position.z)*2,3,3);
});

/* GAME OVER */
if(health<=0){
alert("WASTED 💀");
location.reload();
}

/* RESET MISSION */
if(mission.done){
mission.x = Math.random()*20-10;
mission.z = car.position.z-150;
mission.done=false;
}

/* RENDER */
renderer.render(scene,camera);
}

animate();

}

</script>

</body>
</html>
