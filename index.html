<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Car Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffb37a);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 6, 12);

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);

// ================= ROAD =================
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 500),
  new THREE.MeshStandardMaterial({ color: 0x222222 })
);
road.rotation.x = -Math.PI / 2;
road.position.z = -200;
scene.add(road);

// lane lines
for (let i = 0; i < 50; i++) {
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 0.1, 3),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  line.position.set(0, 0.01, -i * 10);
  scene.add(line);
}

// ================= PLAYER CAR =================
const car = new THREE.Group();

const body = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 0.5, 3),
  new THREE.MeshStandardMaterial({ color: 0xff0000 })
);
body.position.y = 0.5;
car.add(body);

const topPart = new THREE.Mesh(
  new THREE.BoxGeometry(1, 0.5, 1.5),
  new THREE.MeshStandardMaterial({ color: 0xaa0000 })
);
topPart.position.y = 1;
car.add(topPart);

car.position.y = 0;
scene.add(car);

// ================= ENEMIES =================
let enemies = [];

function spawnEnemy() {
  const enemy = new THREE.Group();

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, 0.5, 3),
    new THREE.MeshStandardMaterial({ color: 0x00ffcc })
  );
  body.position.y = 0.5;
  enemy.add(body);

  enemy.position.x = (Math.random() - 0.5) * 6;
  enemy.position.z = car.position.z - 80;

  scene.add(enemy);
  enemies.push(enemy);
}

setInterval(spawnEnemy, 1200);

// ================= CONTROLS =================
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// ================= COLLISION =================
function hit(a, b) {
  return Math.abs(a.position.x - b.position.x) < 1.5 &&
         Math.abs(a.position.z - b.position.z) < 2;
}

// ================= GAME LOOP =================
let speed = 0.3;
let gameOver = false;

function animate() {
  requestAnimationFrame(animate);

  if (gameOver) return;

  // WASD controls
  if (keys["a"]) car.position.x -= 0.15;
  if (keys["d"]) car.position.x += 0.15;
  if (keys["w"]) car.position.z -= speed;
  if (keys["s"]) car.position.z += 0.1;

  car.position.x = Math.max(-4, Math.min(4, car.position.x));

  camera.position.x = car.position.x;
  camera.position.z = car.position.z + 12;
  camera.lookAt(car.position);

  enemies.forEach(e => {
    e.position.z += 0.6;

    if (hit(car, e)) {
      gameOver = true;
      alert("💥 Game Over!");
      location.reload();
    }
  });

  renderer.render(scene, camera);
}

animate();

// resize fix
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
