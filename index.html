<!DOCTYPE html>
<html>
<head>
<title>NEON CITY OFFLINE GTA</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
canvas{display:block}

/* LOADER */
#loader{
position:fixed;inset:0;
background:black;
color:#00f5ff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#play{
padding:15px 40px;
border:2px solid #00f5ff;
cursor:pointer;
margin-top:20px;
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
color:#00f5ff;
white-space:pre;
font-size:14px;
display:none;
}
</style>
</head>

<body>

<div id="loader">
<h1>NEON CITY (OFFLINE MODE)</h1>
<div id="play">PLAY</div>
</div>

<div id="hud"></div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const hud = document.getElementById("hud");
const play = document.getElementById("play");
const loader = document.getElementById("loader");

let keys = {};
let car = {x:canvas.width/2,y:canvas.height-120,speed:0};
let bullets = [];
let police = [];
let score = 0;
let health = 100;

play.onclick = () => {
loader.style.display="none";
hud.style.display="block";

for(let i=0;i<5;i++){
police.push({x:Math.random()*canvas.width,y:-Math.random()*500});
}

gameLoop();
};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function shoot(){
bullets.push({x:car.x,y:car.y});
}

/* SHOOT */
document.addEventListener("keydown",e=>{
if(e.key===" ") shoot();
});

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* ROAD */
ctx.fillStyle="#111";
ctx.fillRect(canvas.width/2-100,0,200,canvas.height);

/* CAR */
if(keys["a"]) car.x-=5;
if(keys["d"]) car.x+=5;
if(keys["w"]) car.y-=3;
if(keys["s"]) car.y+=3;

ctx.fillStyle="red";
ctx.fillRect(car.x,car.y,30,50);

/* BULLETS */
ctx.fillStyle="yellow";
bullets.forEach((b,i)=>{
b.y-=10;
ctx.fillRect(b.x,b.y,5,10);

/* hit police */
police.forEach((p)=>{
if(Math.abs(b.x-p.x)<20 && Math.abs(b.y-p.y)<20){
p.x=Math.random()*canvas.width;
p.y=-200;
score+=10;
}
});
});

/* POLICE AI */
ctx.fillStyle="blue";
police.forEach(p=>{
p.y+=2;

let dx = car.x - p.x;
p.x += dx * 0.02;

ctx.fillRect(p.x,p.y,30,50);

if(Math.abs(p.x-car.x)<30 && Math.abs(p.y-car.y)<30){
health -= 1;
}
});

/* HUD */
hud.innerText =
`SPEED: ${car.speed}
HEALTH: ${health}
SCORE: ${score}`;

/* GAME OVER */
if(health<=0){
alert("GAME OVER");
location.reload();
return;
}

requestAnimationFrame(gameLoop);
}

</script>

</body>
</html>
