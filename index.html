<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEON CITY FIXED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}

/* LOADER */
#loader{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#00f5ff;
z-index:10;
}

#play{
margin-top:20px;
font-size:40px;
padding:15px 50px;
border:2px solid #00f5ff;
cursor:pointer;
}

#play:hover{
background:#00f5ff;
color:black;
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
color:#00f5ff;
font-size:14px;
z-index:5;
display:none;
text-shadow:0 0 10px #00f5ff;
}
</style>
</head>

<body>

<div id="loader">
<h1>NEON CITY</h1>
<div id="play">PLAY</div>
</div>

<div id="hud"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let car;
let speed = 0;
let move = {w:false,a:false,d:false};
let started = false;

const hud = document.getElementById("hud");
const play = document.getElementById("play");
const loader = document.getElementById("loader");

play.onclick = () => {
loader.style.display = "none";
hud.style.display = "block";
startGame();
};

function startGame(){

/* SCENE */
scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

/* CAMERA */
camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);
camera.position.set(0,3,6);

/* RENDERER */
renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT (IMPORTANT FIX) */
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,10,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

/* ROAD */
const road = new THREE.Mesh(
new THREE.PlaneGeometry(20,1000),
new THREE.MeshStandardMaterial({color:0x111111})
);
road.rotation.x = -Math.PI/2;
road.position.z = -400;
scene.add(road);

/* CAR */
car = new THREE.Mesh(
new THREE.BoxGeometry(1,0.6,2),
new THREE.MeshStandardMaterial({color:0xff0000})
);
car.position.y = 0.3;
scene.add(car);

/* CONTROLS */
document.addEventListener("keydown",(e)=>{
if(e.key==="w") move.w=true;
if(e.key==="a") move.a=true;
if(e.key==="d") move.d=true;
});

document.addEventListener("keyup",(e)=>{
if(e.key==="w") move.w=false;
if(e.key==="a") move.a=false;
if(e.key==="d") move.d=false;
});

/* START LOOP */
animate();
}

function animate(){
requestAnimationFrame(animate);

/* DRIVE */
if(move.w) speed += 0.02;
else speed *= 0.97;

car.position.z -= speed;

if(move.a) car.position.x -= 0.15;
if(move.d) car.position.x += 0.15;

/* CAMERA FOLLOW */
camera.position.x += (car.position.x - camera.position.x) * 0.1;
camera.position.z = car.position.z + 6;
camera.lookAt(car.position);

/* HUD */
if(hud){
hud.innerHTML = "SPEED: " + (speed*100).toFixed(1);
}

/* RENDER */
renderer.render(scene,camera);
}

window.addEventListener("resize",()=>{
if(camera && renderer){
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
}
});

</script>

</body>
</html>
