<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GTA MINI DRIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* LOADING SCREEN */
#loader{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:10;
}

#play{
margin-top:20px;
font-size:40px;
padding:15px 50px;
border:2px solid white;
cursor:pointer;
transition:.3s;
}

#play:hover{
background:white;
color:black;
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:14px;
z-index:5;
display:none;
}

</style>
</head>

<body>

<div id="loader">
<h1>GTA MINI LOADING...</h1>
<div id="play">PLAY</div>
</div>

<div id="hud">SPEED: 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let car, speed = 0;
let moveForward = false;
let moveLeft = false;
let moveRight = false;

const loader = document.getElementById("loader");
const playBtn = document.getElementById("play");
const hud = document.getElementById("hud");

/* START GAME */
playBtn.onclick = () => {
loader.style.display = "none";
hud.style.display = "block";
init();
animate();
};

function init(){

scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 200);

camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,7);
scene.add(light);

/* ROAD */
const roadGeo = new THREE.PlaneGeometry(10, 500);
const roadMat = new THREE.MeshStandardMaterial({color:0x222222});
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI/2;
road.position.z = -200;
scene.add(road);

/* CAR */
const carGeo = new THREE.BoxGeometry(1,1,2);
const carMat = new THREE.MeshStandardMaterial({color:0xff0000});
car = new THREE.Mesh(carGeo, carMat);
car.position.y = 0.5;
scene.add(car);

/* CAMERA */
camera.position.set(0,3,6);
camera.lookAt(car.position);

/* KEY CONTROLS */
document.addEventListener("keydown",(e)=>{
if(e.key==="w") moveForward = true;
if(e.key==="a") moveLeft = true;
if(e.key==="d") moveRight = true;
});

document.addEventListener("keyup",(e)=>{
if(e.key==="w") moveForward = false;
if(e.key==="a") moveLeft = false;
if(e.key==="d") moveRight = false;
});

}

function animate(){

requestAnimationFrame(animate);

/* DRIVE SYSTEM */
if(moveForward) speed += 0.01;
else speed *= 0.98;

car.position.z -= speed;

/* STEERING */
if(moveLeft) car.position.x -= 0.1;
if(moveRight) car.position.x += 0.1;

/* CAMERA FOLLOW (GTA STYLE) */
camera.position.x += (car.position.x - camera.position.x) * 0.1;
camera.position.z = car.position.z + 6;
camera.lookAt(car.position);

/* HUD */
hud.innerHTML = "SPEED: " + (speed*100).toFixed(1);

/* LOOP ROAD */
if(car.position.z < -200){
car.position.z = 0;
}

renderer.render(scene,camera);

}

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
