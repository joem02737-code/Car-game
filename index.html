<!DOCTYPE html>
<html>
<head>
<title>Ultra Car Demo</title>
<style>
body{margin:0;overflow:hidden;background:#111;}
canvas{display:block;}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* CAR */
const car = {
x:canvas.width/2,
y:canvas.height-150,
speed:0,
angle:0
};

let keys = {};

addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

/* ROAD LINES */
let lines = [];
for(let i=0;i<20;i++){
lines.push({y:i*40});
}

/* LIGHT SOURCE */
let lightX = -200;
let lightY = -200;

function drawCar(){

/* SHADOW */
ctx.fillStyle="rgba(0,0,0,0.4)";
ctx.beginPath();
ctx.ellipse(car.x+10,car.y+40,40,20,0,0,Math.PI*2);
ctx.fill();

/* BODY GRADIENT (REALISTIC LOOK) */
let body = ctx.createLinearGradient(car.x-20,car.y,car.x+40,car.y+60);
body.addColorStop(0,"#ff003c");
body.addColorStop(0.5,"#ff2f6d");
body.addColorStop(1,"#8b001f");

ctx.fillStyle = body;

/* MAIN CAR BODY */
ctx.fillRect(car.x-25,car.y-60,50,100);

/* ROOF */
ctx.fillStyle="#b0002a";
ctx.fillRect(car.x-18,car.y-90,36,30);

/* WINDOW (REFLECTION EFFECT) */
let glass = ctx.createLinearGradient(car.x,car.y-90,car.x,car.y-40);
glass.addColorStop(0,"rgba(255,255,255,0.6)");
glass.addColorStop(1,"rgba(0,0,0,0.3)");

ctx.fillStyle=glass;
ctx.fillRect(car.x-15,car.y-85,30,25);

/* LIGHT HIGHLIGHT */
ctx.fillStyle="rgba(255,255,255,0.2)";
ctx.fillRect(car.x-20,car.y-60,10,100);

/* WHEELS */
ctx.fillStyle="#111";
ctx.fillRect(car.x-30,car.y-50,10,25);
ctx.fillRect(car.x+20,car.y-50,10,25);
ctx.fillRect(car.x-30,car.y+10,10,25);
ctx.fillRect(car.x+20,car.y+10,10,25);

/* WHEEL SHINE */
ctx.fillStyle="rgba(255,255,255,0.1)";
ctx.fillRect(car.x-29,car.y-48,4,20);
ctx.fillRect(car.x+21,car.y-48,4,20);
}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* DARK ROAD */
ctx.fillStyle="#1a1a1a";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* ROAD CENTER */
ctx.fillStyle="#333";
ctx.fillRect(canvas.width/2-100,0,200,canvas.height);

/* ROAD LINES */
ctx.fillStyle="white";
lines.forEach(l=>{
l.y += car.speed;

if(l.y>canvas.height) l.y=0;

ctx.fillRect(canvas.width/2-5,l.y,10,30);
});

/* CONTROLS */
if(keys["a"]) car.x -= 5;
if(keys["d"]) car.x += 5;
if(keys["w"]) car.speed += 0.2;
if(keys["s"]) car.speed -= 0.2;

car.speed *= 0.95;

/* DRAW CAR */
drawCar();

/* CAMERA SHAKE FEEL */
ctx.fillStyle="rgba(255,255,255,0.02)";
ctx.fillRect(0,0,canvas.width,canvas.height);

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
