<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEON CITY ULTIMATE ENGINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
canvas{display:block}

/* LOADER */
#loader{
position:fixed;inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#00f5ff;
z-index:10;
}

#play{
margin-top:20px;
font-size:35px;
padding:15px 50px;
border:2px solid #00f5ff;
cursor:pointer;
}

#play:hover{
background:#00f5ff;
color:black;
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
color:#00f5ff;
font-size:13px;
z-index:5;
display:none;
white-space:pre;
text-shadow:0 0 10px #00f5ff;
}
</style>
</head>

<body>

<div id="loader">
<h1>NEON CITY ENGINE</h1>
<div id="play">PLAY</div>
</div>

<div id="hud"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>

<script>

let scene,camera,renderer;
let car;
let speed=0;
let move={w:false,a:false,d:false};
let bullets=[];
let enemies=[];
let police=[];
let coins=[];
let particles=[];
let health=100;
let wanted=0;
let score=0;

const hud=document.getElementById("hud");
const loader=document.getElementById("loader");
const play=document.getElementById("play");

play.onclick=()=>{
loader.style.display="none";
hud.style.display="block";
init();
animate();
};

function init(){

scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x000000,10,120);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,0.6));

/* ROAD */
let road=new THREE.Mesh(
new THREE.PlaneGeometry(200,2000),
new THREE.MeshStandardMaterial({color:0x111111})
);
road.rotation.x=-Math.PI/2;
road.position.z=-800;
scene.add(road);

/* CAR */
car=new THREE.Mesh(
new THREE.BoxGeometry(1,0.6,2),
new THREE.MeshStandardMaterial({color:0xff0000})
);
car.position.y=0.3;
scene.add(car);

/* CITY */
for(let i=0;i<80;i++){
let b=new THREE.Mesh(
new THREE.BoxGeometry(
Math.random()*5+2,
Math.random()*25+5,
Math.random()*5+2
),
new THREE.MeshStandardMaterial({color:0x222244})
);
b.position.set((Math.random()-0.5)*100,10,-i*12);
scene.add(b);
}

/* NPC CARS */
for(let i=0;i<8;i++){
let e=new THREE.Mesh(
new THREE.BoxGeometry(1,0.6,2),
new THREE.MeshStandardMaterial({color:0x00ff00})
);
e.position.set((Math.random()-0.5)*20,0.3,-Math.random()*400);
scene.add(e);
enemies.push(e);
}

/* POLICE */
for(let i=0;i<3;i++){
let p=new THREE.Mesh(
new THREE.BoxGeometry(1,0.6,2),
new THREE.MeshStandardMaterial({color:0x0000ff})
);
p.position.set((Math.random()-0.5)*10,0.3,-Math.random()*200);
scene.add(p);
police.push(p);
}

/* CAMERA */
camera.position.set(0,3,6);

/* CONTROLS */
document.addEventListener("keydown",(e)=>{
if(e.key==="w") move.w=true;
if(e.key==="a") move.a=true;
if(e.key==="d") move.d=true;
if(e.key===" ") shoot();
});

document.addEventListener("keyup",(e)=>{
if(e.key==="w") move.w=false;
if(e.key==="a") move.a=false;
if(e.key==="d") move.d=false;
});

}

/* SHOOT BULLET */
function shoot(){
let b=new THREE.Mesh(
new THREE.SphereGeometry(0.15),
new THREE.MeshBasicMaterial({color:0xffff00})
);
b.position.copy(car.position);
scene.add(b);
bullets.push(b);
wanted=Math.min(5,wanted+0.5);
}

/* EXPLOSION */
function boom(pos){
for(let i=0;i<10;i++){
let p=new THREE.Mesh(
new THREE.SphereGeometry(0.1),
new THREE.MeshBasicMaterial({color:0xff6600})
);
p.position.copy(pos);
p.velocity=new THREE.Vector3(
(Math.random()-0.5)*0.2,
Math.random()*0.2,
(Math.random()-0.5)*0.2
);
scene.add(p);
particles.push(p);
}
}

/* LOOP */
function animate(){
requestAnimationFrame(animate);

/* DRIVE */
if(move.w) speed+=0.02;
else speed*=0.97;

car.position.z-=speed;

if(move.a) car.position.x-=0.15;
if(move.d) car.position.x+=0.15;

/* CAMERA */
camera.position.x+=(car.position.x-camera.position.x)*0.08;
camera.position.z=car.position.z+6;
camera.lookAt(car.position);

/* BULLETS */
bullets.forEach((b,i)=>{
b.position.z-=1;

/* HIT POLICE */
police.forEach((p,pi)=>{
if(b.position.distanceTo(p.position)<1){
scene.remove(p);
police.splice(pi,1);
scene.remove(b);
bullets.splice(i,1);
score+=100;
wanted=Math.min(5,wanted+1);
boom(p.position);
}
});
});

/* POLICE AI */
police.forEach(p=>{
let dir=new THREE.Vector3().subVectors(car.position,p.position).normalize();
p.position.x+=dir.x*0.06;
p.position.z+=dir.z*0.06;

if(p.position.distanceTo(car.position)<2){
health-=0.5;
}
});

/* ENEMIES */
enemies.forEach(e=>{
e.position.z+=0.2;
if(e.position.z>car.position.z+50) e.position.z=car.position.z-300;
});

/* PARTICLES */
particles.forEach((p,i)=>{
p.position.add(p.velocity);
p.velocity.y-=0.01;
if(p.position.y<-5){
scene.remove(p);
particles.splice(i,1);
}
});

/* WANTED SYSTEM */
if(speed>0.3) wanted=Math.min(5,wanted+0.01);
else wanted=Math.max(0,wanted-0.02);

/* HUD */
hud.innerText=
`SPEED: ${(speed*100).toFixed(1)}
HEALTH: ${health.toFixed(0)}
SCORE: ${score}
WANTED: ${wanted.toFixed(1)}
POLICE: ${police.length}`;

/* GAME OVER */
if(health<=0){
alert("YOU DIED");
location.reload();
}

renderer.render(scene,camera);
}

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
