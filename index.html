<!DOCTYPE html>
<html>
<head>
<title>Realistic 3D Car</title>
<style>
body{margin:0;overflow:hidden;}
</style>
</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* SCENE */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

/* CAMERA */
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* LIGHTS (IMPORTANT FOR REALISM) */
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(5,10,5);
sun.castShadow = true;
scene.add(sun);

scene.add(new THREE.AmbientLight(0x404040,0.6));

/* GROUND (with slight reflection illusion) */
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({
color:0x1a1a1a,
roughness:0.9,
metalness:0.1
})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

/* =========================
   🚗 REAL CAR BUILD
========================= */
const car = new THREE.Group();

/* BODY (long realistic chassis) */
const body = new THREE.Mesh(
new THREE.BoxGeometry(2.4,0.6,5),
new THREE.MeshStandardMaterial({
color:0xff1e2d,
metalness:0.7,
roughness:0.25
})
);
body.position.y = 0.8;
body.castShadow = true;
car.add(body);

/* FRONT HOOD (lower front = car shape feel) */
const hood = new THREE.Mesh(
new THREE.BoxGeometry(2.2,0.5,2.2),
new THREE.MeshStandardMaterial({
color:0xe60026,
metalness:0.8,
roughness:0.2
})
);
hood.position.set(0,0.7,1.4);
car.add(hood);

/* CABIN (glass area) */
const cabin = new THREE.Mesh(
new THREE.BoxGeometry(1.6,0.7,2),
new THREE.MeshStandardMaterial({
color:0x111111,
metalness:0.2,
roughness:0.1,
transparent:true,
opacity:0.7
})
);
cabin.position.set(0,1.2,-0.3);
car.add(cabin);

/* WHEELS (proper size + depth) */
function wheel(x,z){
const w = new THREE.Mesh(
new THREE.CylinderGeometry(0.45,0.45,0.4,24),
new THREE.MeshStandardMaterial({
color:0x111111,
roughness:1
})
);
w.rotation.z = Math.PI/2;
w.position.set(x,0.45,z);
w.castShadow = true;
car.add(w);
}

wheel(-1.2, 1.6);
wheel( 1.2, 1.6);
wheel(-1.2,-1.6);
wheel( 1.2,-1.6);

scene.add(car);

/* CAMERA POSITION */
camera.position.set(0,3,8);

/* CONTROLS */
let keys = {};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

/* ANIMATION */
function animate(){
requestAnimationFrame(animate);

/* DRIVE */
if(keys["w"]) car.position.z -= 0.15;
if(keys["s"]) car.position.z += 0.15;
if(keys["a"]) car.position.x -= 0.15;
if(keys["d"]) car.position.x += 0.15;

/* CAMERA FOLLOW (smooth GTA style) */
camera.position.lerp(
new THREE.Vector3(
car.position.x,
car.position.y + 3,
car.position.z + 8
),
0.08
);
camera.lookAt(car.position);

/* WHEEL ROTATION FEEL */
car.children.forEach(o=>{
if(o.geometry && o.geometry.type==="CylinderGeometry"){
o.rotation.x += 0.3;
}
});

renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
